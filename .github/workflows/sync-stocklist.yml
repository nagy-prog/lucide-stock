name: Lucide Stocklist Sync

on:
  schedule:
    # Každý deň o 05:00 UTC (= 06:00 SEČ / 07:00 SELČ)
    - cron: '0 5 * * *'
  # Možnosť spustiť manuálne z GitHub UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitára
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stiahnuť Lucide stocklist
        run: |
          echo "Sťahujem stocklist z Lucide servera..."
          curl -v \
            --max-time 60 \
            --retry 3 \
            --retry-delay 10 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:124.0) Gecko/20100101 Firefox/124.0" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: sk,en-US;q=0.7,en;q=0.3" \
            -o data/stocklist_lucide.csv \
            "http://195.91.102.16:88/lu/download/stocklist_lucide.csv"

          echo "Veľkosť stiahnutého súboru:"
          wc -l data/stocklist_lucide.csv
          head -2 data/stocklist_lucide.csv

      - name: Pridať dátum aktualizácie
        run: |
          DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')
          echo "$DATE" > data/last_updated.txt
          echo "Dátum uložený: $DATE"

      - name: Commit a push zmien
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/stocklist_lucide.csv data/last_updated.txt

          # Commitni len ak sú zmeny
          if git diff --staged --quiet; then
            echo "CSV sa nezmenilo — žiadny commit."
          else
            LINES=$(wc -l < data/stocklist_lucide.csv)
            git commit -m "Stocklist update $(date '+%Y-%m-%d') — ${LINES} riadkov"
            git push
            echo "Úspešne pushnuté!"
          fi
